<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes - UCT</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body class="bg-light">
    <!-- NAV -->
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid px-4">
            <span class="navbar-brand">Sistema de Solicitudes - UCT</span>
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-outline-light btn-sm" id="btnLogout">
                    <i class="bi bi-box-arrow-right me-1"></i>Salir
                </button>
            </div>
        </div>
    </nav>
    <!-- main center -->
    <div class="container mt-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Gestión de Solicitudes</h5>
                <button class="btn btn-light btn-sm" id="btnNuevaSolicitud">
                    <i class="bi bi-plus-circle me-1"></i>Nueva Solicitud
                </button>
            </div>
            <div class="card-body">
                <!-- Buscador -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" id="inputBuscar" class="form-control"
                                placeholder="Buscar por nombre o correo...">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <select id="filtroEstado" class="form-select">
                            <option value="">Todos los estados</option>
                            <option value="Pendiente">Pendiente</option>
                            <option value="En revisión">En revisión</option>
                            <option value="Aprobada">Aprobada</option>
                            <option value="Rechazada">Rechazada</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select id="filtroTipo" class="form-select">
                            <option value="">Todos los tipos de solicitud</option>
                        </select>
                    </div>
                </div>

                <!-- Tabla de solicitudes -->
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-primary">
                            <tr>
                                <th>ID</th>
                                <th>Solicitante</th>
                                <th>Tipo</th>
                                <th>Descripción</th>
                                <th>Estado</th>
                                <th>Fecha</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaSolicitudes">
                            <tr>
                                <td colspan="7" class="text-center text-muted py-4">
                                    <div class="spinner-border spinner-border-sm " role="status"></div>
                                    Cargando solicitudes...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Modal Nueva Solicitud -->
                <div class="modal fade" id="modalNuevaSolicitud" tabindex="-1"
                    aria-labelledby="modalNuevaSolicitudLabel" aria-hidden="true">
                    <div class="modal-dialog modal-lg">
                        <div class="modal-content">
                            <div class="modal-header bg-primary text-white">
                                <h5 class="modal-title" id="modalNuevaSolicitudLabel">Nueva Solicitud</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                                    aria-label="Cerrar"></button>
                            </div>
                            <div class="modal-body">
                                <form id="formNuevaSolicitud">
                                    <div class="mb-3">
                                        <label for="solicitante" class="form-label">Solicitante</label>
                                        <input type="text" class="form-control" id="solicitante" name="solicitante"
                                            readonly required>
                                        <input type="hidden" id="solicitanteId" name="solicitanteId">
                                    </div>
                                    <div class="mb-3">
                                        <label for="tipo" class="form-label">Tipo de Solicitud</label>
                                        <select id="TipoModal" class="form-select" name="tipo" required>
                                            <option value="">Todos los tipos de solicitud</option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label for="descripcion" class="form-label">Descripción</label>
                                        <textarea class="form-control" id="descripcion" name="descripcion" rows="3"
                                            required></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label for="estado" class="form-label">Estado inicial</label>
                                        <select class="form-select" id="estado" name="estado" required>
                                            <option value="Pendiente">Pendiente</option>
                                        </select>
                                    </div>
                                </form>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary"
                                    data-bs-dismiss="modal">Cancelar</button>
                                <button type="submit" form="formNuevaSolicitud" class="btn btn-primary">Guardar</button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/home.js"></script>
</body>

</html>
